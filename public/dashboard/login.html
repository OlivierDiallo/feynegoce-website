<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Feynegoce — Dashboard Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="dashboard.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
    .login-wrap { width:100%; max-width:400px; padding:0 20px; }
    .login-logo { text-align:center; margin-bottom:40px; }
    .login-logo a { font-size:28px; font-weight:700; letter-spacing:-.02em; color:var(--white); text-decoration:none; }
    .login-logo a span { color:var(--accent); }
    .login-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:36px; }
    .login-card h1 { font-size:1.25rem; font-weight:600; margin-bottom:6px; }
    .login-card p { color:var(--muted); font-size:.875rem; margin-bottom:28px; }
    .form-group { margin-bottom:18px; }
    .form-group label { display:block; font-size:.8125rem; font-weight:500; margin-bottom:6px; color:var(--muted); }
    .form-group input {
      width:100%; padding:10px 14px; background:var(--bg); border:1px solid var(--border);
      border-radius:6px; color:var(--white); font-size:.9375rem; font-family:inherit;
      transition:border-color .15s;
    }
    .form-group input:focus { outline:none; border-color:var(--accent); }
    .btn-login { width:100%; padding:12px; background:var(--accent); color:#fff; border:none;
      border-radius:6px; font-size:.9375rem; font-weight:600; cursor:pointer;
      font-family:inherit; transition:background .15s; }
    .btn-login:hover { background:#b5832c; }
    .btn-login:disabled { opacity:.5; cursor:not-allowed; }
    .login-error { color:#f87171; font-size:.8125rem; margin-top:12px; display:none; }
    .back-link { display:block; text-align:center; margin-top:20px; font-size:.8125rem; color:var(--muted); }
    .back-link a { color:var(--accent); text-decoration:none; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <a href="/">Feynegoce<span>.</span></a>
    </div>
    <div class="login-card">
      <h1>Welcome back</h1>
      <p>Sign in to access the investor dashboard.</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@feynegoce.com" autocomplete="email" required/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Sign in</button>
        <p class="login-error" id="loginError"></p>
      </form>
    </div>
    <p class="back-link"><a href="/">← Back to Feynegoce.com</a></p>
  </div>
  <script>
    // Redirect if already logged in
    const token = localStorage.getItem('fn_token');
    const role  = localStorage.getItem('fn_role');
    if (token && role) {
      window.location.href = role === 'admin' ? '/dashboard/admin.html' : '/dashboard/investor.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn   = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errEl.style.display = 'none';

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error);
        localStorage.setItem('fn_token', data.token);
        localStorage.setItem('fn_role',  data.user.role);
        localStorage.setItem('fn_name',  data.user.name);
        window.location.href = data.user.role === 'admin' ? '/dashboard/admin.html' : '/dashboard/investor.html';
      } catch (err) {
        errEl.textContent   = err.message;
        errEl.style.display = 'block';
        btn.disabled        = false;
        btn.textContent     = 'Sign in';
      }
    });
  </script>
</body>
</html>
